<!DOCTYPE html>

<html>
    <head>
        <title>Student Grade Manager</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>Student Grade Manager</h1>

            <label for="student_input">Student Name:</label>
            <input type="text" id="student_input"> <br>

            <label for="grade_input">Enter Grade:</label>
            <input type="text" id="grade_input"> <br>

            <button id="add_Student">Add Student</button>
            <button id="show_Students">Show Students</button>
            <button id="show_Statistics">Show Statistics</button>
            <button id="reset">Reset</button>

            <h3 id="output"></h3>

        </div>
        <script src="script.js"></script>
    </body>
</html>
